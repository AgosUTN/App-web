<div class="dialog">
  <div class="dialog-header">
    <div class="badge">Libro</div>
    <h2 id="dialog-title">{{ libro.titulo }}</h2>

    <span class="isbn">ISBN: {{ libro.isbn }}</span>

    <button class="dialog-close" (click)="closeDialog()">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
      >
        <path [attr.d]="icons.exitPath" />
      </svg>
    </button>
  </div>

  <div class="dialog-body">
    <div>
      <p class="section-label">Descripción</p>
      <div class="descripcion-block">
        {{ libro.descripcion }}
      </div>
    </div>

    <div class="ejemplares-section">
      <div class="ejemplares-header">
        <p class="section-label" style="margin-bottom: 0">Ejemplares</p>
        <button class="btn-nuevo" (click)="createEjemplar(libro.id)" [disabled]="isLoading">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path [attr.d]="icons.newPath" />
          </svg>
          Nuevo ejemplar
        </button>
      </div>

      <table class="ejemplares-table" *ngIf="!isLoading">
        <thead>
          <tr>
            <th style="width: 60px">#</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>

        <tbody>
          <ng-container *ngIf="ejemplares.length > 0; else emptyState">
            <tr *ngFor="let ejemplar of ejemplares">
              <td class="id-cell">{{ ejemplar.idEjemplar }}</td>
              <td>
                <span [ngClass]="getStateStyle(ejemplar.estado)" class="estado-badge">{{
                  ejemplar.estado
                }}</span>
              </td>
              <td>
                <button
                  class="btn-eliminar"
                  [disabled]="ejemplar.estado == 'ELIMINADO'"
                  (click)="deleteEjemplar(ejemplar)"
                  *ngIf="ejemplar.estado !== 'PRESTADO'"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path [attr.d]="icons.altDeletePath" />
                  </svg>
                  Eliminar
                </button>
                <button
                  type="button"
                  class="btn-eliminar"
                  (click)="navigateToPrestamo(ejemplar)"
                  *ngIf="ejemplar.estado === 'PRESTADO'"
                >
                  Ver préstamo
                </button>
              </td>
            </tr>
          </ng-container>
          <ng-template #emptyState>
            <td colspan="3">
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path [attr.d]="icons.infoPath" stroke-linecap="round" />
                </svg>
                No hay ejemplares registrados para este libro.
              </div>
            </td>
          </ng-template>
        </tbody>
      </table>
      <div *ngIf="isLoading" class="spinner-container">
        <mat-spinner></mat-spinner>
      </div>
    </div>
  </div>

  <div class="dialog-footer">
    <button class="btn-cerrar" (click)="closeDialog()">Cerrar</button>
  </div>
</div>
