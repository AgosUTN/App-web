<ng-container *ngIf="!isMobile; else mobileTemplate">
  <div class="layout-desktop">
    <div class="card">
      <form class="table__searchContainer" [formGroup]="searchInput" (ngSubmit)="onSubmit()">
        <input
          class="form__input"
          id="data"
          type="text"
          formControlName="data"
          placeholder="Días de atraso máximo"
          maxlength="5"
          onlyNumbers
        />

        <button
          mat-raised-button
          class="form__button"
          type="submit"
          [disabled]="searchInput.invalid"
          [class.form__button--disabled]="searchInput.invalid"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="white"
          >
            <path [attr.d]="icons.searchPath" />
          </svg>
        </button>
        <button
          mat-raised-button
          type="button"
          class="form__addButton"
          routerLink="/politicasSancion/alta"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="black"
          >
            <path [attr.d]="icons.addPath" />
          </svg>
        </button>
      </form>
      <table
        mat-table
        [dataSource]="dataSource"
        (matSortChange)="onSortChange($event)"
        matSort
        class="table"
      >
        <ng-container matColumnDef="diasHasta">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Dias de atraso máximo</th>
          <td mat-cell *matCellDef="let politica">
            <ng-container *ngIf="!isLoading; else skeleton1">{{ politica.diasHasta }}</ng-container>
            <ng-template #skeleton1>
              <div class="skeleton"></div>
            </ng-template></td
        ></ng-container>
        <ng-container matColumnDef="diasSancion">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Días de sanción</th>
          <td mat-cell *matCellDef="let politica">
            <ng-container *ngIf="!isLoading; else skeleton2">
              {{ politica.diasSancion }}
            </ng-container>
            <ng-template #skeleton2>
              <div class="skeleton"></div>
            </ng-template>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th class="actions-header" mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let politica">
            <div class="actions-container">
              <button
                mat-button
                type="button"
                class="actions-button"
                [routerLink]="['/politicasSancion/editar', politica.diasHasta]"
                [disabled]="isLoading"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 -960 960 960"
                  class="actions-button__svg"
                >
                  <path [attr.d]="icons.editPath" />
                </svg>
              </button>
              <button
                mat-button
                class="actions-button"
                [disabled]="isLoading"
                (click)="deletePolitica(politica)"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="actions-button__svg"
                  viewBox="0 -960 960 960"
                >
                  <path [attr.d]="icons.deletePath" />
                </svg>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          [class.table__row--empty]="!row.diasHasta"
        ></tr>
      </table>
      <mat-paginator
        [length]="totalRecords"
        [pageSize]="pageSize"
        [pageSizeOptions]="[6, 10, 25]"
        [pageIndex]="pageIndex"
        aria-label="Seleccionar página"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </div>
  </div>
</ng-container>

<ng-template #mobileTemplate>
  <div class="layout-mobile">
    <div class="layout-header">
      <form class="table__searchContainer" [formGroup]="searchInput" (ngSubmit)="onSubmit()">
        <input
          class="form__input"
          id="data"
          type="text"
          formControlName="data"
          placeholder="Días de atraso máximo"
          maxlength="5"
          onlyNumbers
        />

        <button
          mat-raised-button
          class="form__button"
          type="submit"
          [disabled]="searchInput.invalid"
          [class.form__button--disabled]="searchInput.invalid"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="white"
          >
            <path [attr.d]="icons.searchPath" />
          </svg>
        </button>
        <button
          mat-raised-button
          type="button"
          class="form__addButton"
          routerLink="/politicasSancion/alta"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="black"
          >
            <path [attr.d]="icons.addPath" />
          </svg>
        </button>
      </form>
    </div>
    <div class="layout-content">
      <ng-container *ngFor="let politica of dataSource.data">
        <div class="crud-card" *ngIf="politica.diasHasta !== 0">
          <div class="card__header-strip"></div>

          <div class="card__body">
            <div class="card__top-row">
              <span class="card__id">{{ politica.diasHasta }} Dias de atraso máximo</span>
              <div class="card__actions">
                <button
                  mat-button
                  type="button"
                  class="actions-button"
                  [routerLink]="['/politicasSancion/editar', politica.diasHasta]"
                  [disabled]="isLoading"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 -960 960 960"
                    class="actions-button__svg"
                  >
                    <path [attr.d]="icons.editPath" />
                  </svg>
                </button>
                <button
                  mat-button
                  class="actions-button"
                  (click)="deletePolitica(politica)"
                  [disabled]="isLoading"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="actions-button__svg"
                    viewBox="0 -960 960 960"
                  >
                    <path [attr.d]="icons.deletePath" />
                  </svg>
                </button>
              </div>
            </div>
            <span class="card__nombre">{{ politica.diasSancion }} Días de sanción</span>
          </div>
        </div>
      </ng-container>
    </div>
    <div class="layout-footer">
      <mat-paginator
        [length]="totalRecords"
        [pageSize]="pageSize"
        [pageSizeOptions]="[6, 10, 25]"
        [pageIndex]="pageIndex"
        aria-label="Seleccionar página"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </div>
  </div>
</ng-template>
