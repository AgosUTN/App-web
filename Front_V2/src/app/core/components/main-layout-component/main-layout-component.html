<div class="sideNavLayout" [ngClass]="getSideNavClass()">
  <app-sidenav
    [sideNavOpen]="sideNavOpen"
    [isMobile]="isMobile"
    (itemClicked)="toggleSideNav()"
  ></app-sidenav>
</div>
<div class="headerLayout" [class.headerLayout--colapsed]="!sideNavOpen && !isMobile">
  <app-toolbar (menuClick)="toggleSideNav()"></app-toolbar>
</div>
<div
  class="mainLayout"
  [class.mainLayout--colapsed]="!sideNavOpen && !isMobile"
  (click)="toggleSideNavMobile()"
>
  <router-outlet></router-outlet>
</div>
<div
  class="backdrop"
  [class.backdrop--active]="sideNavOpen && isMobile"
  (click)="toggleSideNavMobile()"
></div>
